<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Orb Lab — Fitness Sherpa coach</title>
<style>
  :root{
    --bg:#0E0F11; --bg-deep:#08090A; --surface:#1A1B1E; --surface-2:#232427; --line:#2A2C30;
    --text:#F4F5F4; --muted:#8A8E95; --faint:#5A5E65;
    --mint:#C7F0E3; --accent:#C7F0E3; --mono:"SF Mono","JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Segoe UI",system-ui,sans-serif;
  }
  /* registered so the rim-light can animate (charge / state changes interpolate) */
  @property --ly{ syntax:'<percentage>'; inherits:true; initial-value:88%; }
  @property --spread{ syntax:'<percentage>'; inherits:true; initial-value:50%; }
  @property --lop{ syntax:'<number>'; inherits:true; initial-value:.8; }
  @property --rim{ syntax:'<color>'; inherits:true; initial-value:rgba(199,240,227,.6); }
  @property --glowc{ syntax:'<color>'; inherits:true; initial-value:rgba(199,240,227,.3); }

  *{box-sizing:border-box;margin:0;padding:0}
  body{ background:radial-gradient(900px 500px at 50% 0%,#101319,var(--bg-deep)); color:var(--text);
    font-family:var(--font); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:34px 20px 60px; }
  h1{ font-size:15px; font-weight:700; letter-spacing:-.3px; }
  .sub{ font-family:var(--mono); font-size:10px; letter-spacing:2px; color:var(--faint); margin-top:6px; }

  /* ---------- THE ORB — a dark planet, rim-lit by readiness ---------- */
  .stage{ margin:44px 0 30px; position:relative; width:260px; height:260px; display:grid; place-items:center; }
  .orb{ position:relative; width:230px; height:230px; display:grid; place-items:center; }

  .core{ position:relative; width:210px; height:210px; border-radius:50%; overflow:hidden;
    background:radial-gradient(circle at 38% 30%, #0c1814, #05090b 78%);
    box-shadow:0 16px 46px -8px var(--glowc),                  /* light bleeds straight off the bottom limb */
               inset 0 0 0 1px rgba(160,230,210,.05);
    transition:--glowc .95s ease; }
  .mini .core{ width:42px; height:42px; box-shadow:0 5px 16px -4px var(--glowc), inset 0 0 0 1px rgba(160,230,210,.05); }
  .lwrap{ position:absolute; inset:0; animation:breathe 5.6s ease-in-out infinite; }
  /* the rim light: a glow seated at the BOTTOM that climbs + brightens with readiness */
  .light{ position:absolute; inset:-18%; border-radius:50%;
    background:radial-gradient(circle at 50% var(--ly), var(--rim) 0%, transparent var(--spread));
    opacity:var(--lop);
    transition:--ly .95s cubic-bezier(.22,.7,.2,1), --spread .95s, --lop .95s, --rim .95s; }
  /* a crisp atmospheric edge right at the lit limb (bottom) */
  .rim{ position:absolute; inset:0; border-radius:50%; pointer-events:none;
    box-shadow:inset 0 -13px 22px -8px var(--rim), inset 0 -6px 13px -6px var(--rim); transition:--rim .95s; }
  .pct{ position:absolute; inset:0; display:grid; place-items:center; z-index:3;
    font-size:30px; font-weight:800; color:rgba(2,6,5,.85); }
  .mini .pct{ display:none; }

  @keyframes breathe{ 0%,100%{ transform:scale(1); opacity:1 } 50%{ transform:scale(1.035); opacity:.94 } }
  @keyframes flicker{ 0%,100%{ transform:scale(1); opacity:1 } 30%{ transform:scale(1.02); opacity:.85 } 65%{ transform:scale(.995); opacity:.97 } }

  .orb.thinking .lwrap{ animation:flicker 1.3s ease-in-out infinite; }
  .orb.speaking .lwrap{ animation:breathe 1.35s ease-in-out infinite; }

  /* ---------- controls ---------- */
  .panel{ display:flex; flex-direction:column; gap:13px; align-items:center; }
  .group{ display:flex; align-items:center; gap:8px; }
  .glabel{ font-family:var(--mono); font-size:9px; letter-spacing:1.5px; color:var(--faint); width:74px; text-align:right; }
  .btn{ background:var(--surface); border:1px solid var(--line); color:var(--text); font-family:var(--font);
    font-size:12.5px; font-weight:600; padding:9px 14px; border-radius:999px; cursor:pointer; transition:.15s; }
  .btn:hover{ border-color:#3a5b52; }
  .btn.on{ background:rgba(199,240,227,.12); border-color:var(--accent); color:var(--mint); }
  .slider{ -webkit-appearance:none; width:150px; height:4px; border-radius:3px; background:var(--surface-2); outline:none; }
  .slider::-webkit-slider-thumb{ -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--accent); cursor:pointer; }
  .slider::-moz-range-thumb{ width:16px; height:16px; border:none; border-radius:50%; background:var(--accent); cursor:pointer; }

  .ctx{ margin-top:32px; display:flex; gap:14px; align-items:center; }
  .ctx-card{ display:flex; align-items:center; gap:11px; background:var(--surface); border:1px solid var(--line);
    border-left:3px solid var(--accent); border-radius:0 16px 16px 0; padding:12px 15px; }
  .ctx-card .t{ font-size:13px; font-weight:700; } .ctx-card .s{ font-size:11px; color:var(--muted); margin-top:2px; }
  .note{ font-family:var(--mono); font-size:9px; letter-spacing:1px; color:var(--faint); margin-top:26px; text-align:center; line-height:1.7; }
</style>
</head>
<body>
  <h1>Orb Lab</h1>
  <div class="sub">FITNESS SHERPA · COACH CHARACTER · v4 · RIM-LIT PLANET</div>

  <div class="stage">
    <div class="orb idle" id="orb">
      <div class="core">
        <div class="lwrap"><div class="light"></div></div>
        <div class="rim"></div>
        <div class="pct" id="pct">82</div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="group"><span class="glabel">STATE</span>
      <button class="btn on" data-act="idle" onclick="setAct(this,'idle')">Idle</button>
      <button class="btn" data-act="thinking" onclick="setAct(this,'thinking')">Thinking</button>
      <button class="btn" data-act="speaking" onclick="setAct(this,'speaking')">Speaking</button>
    </div>
    <div class="group"><span class="glabel">READINESS</span>
      <button class="btn on" data-mood="green" onclick="setMood(this,85)">Recovered</button>
      <button class="btn" data-mood="amber" onclick="setMood(this,55)">Borderline</button>
      <button class="btn" data-mood="red" onclick="setMood(this,25)">Under</button>
    </div>
    <div class="group"><span class="glabel">LIGHT</span>
      <input class="slider" id="fillSlider" type="range" min="0" max="100" value="82" oninput="setFill(this.value,false)">
      <button class="btn" onclick="charge()">⚡ Charge</button>
    </div>
  </div>

  <div class="ctx">
    <div class="ctx-card">
      <div class="orb mini idle" id="mini">
        <div class="core"><div class="lwrap"><div class="light"></div></div><div class="rim"></div></div>
      </div>
      <div><div class="t">AI Coach</div><div class="s">readiness 82 · primed</div></div>
    </div>
  </div>

  <div class="note">a dark planet, rim-lit by readiness — the light climbs + wraps the limb as you charge<br>recovered = bright light high on the sphere · drained = a thin dim sliver at the base</div>

<script>
  const pct=document.getElementById('pct'), slider=document.getElementById('fillSlider');
  const orbs=[document.getElementById('orb'), document.getElementById('mini')];
  let fillVal=82;
  const mix=(a,b,t)=>a.map((v,i)=>Math.round(v+(b[i]-v)*t));
  function setFill(p, animate){
    fillVal=Math.max(0,Math.min(100,Math.round(+p)));
    const f=fillVal/100;
    const [r,g,b]=mix([72,146,126],[199,240,227],f);   // richer mint (drained) -> bright mint (charged)
    orbs.forEach(o=>{
      o.querySelectorAll('.light,.rim,.core').forEach(el=>el.style.transition = animate ? '' : 'none');
      o.style.setProperty('--ly',(92-26*f).toFixed(1)+'%');        // light climbs the limb
      o.style.setProperty('--spread',(42+24*f).toFixed(1)+'%');    // glow reaches higher up the sphere
      o.style.setProperty('--lop',(0.5+0.5*f).toFixed(2));
      o.style.setProperty('--rim',`rgba(${r},${g},${b},${(0.45+0.45*f).toFixed(2)})`);
      o.style.setProperty('--glowc',`rgba(${r},${g},${b},${(0.12+0.45*f).toFixed(2)})`);
    });
    if(pct) pct.textContent=fillVal;
    if(slider && +slider.value!==fillVal) slider.value=fillVal;
  }
  function charge(){ const target=+slider.value; setFill(0,false); setTimeout(()=>setFill(target,true),40); }
  function setAct(btn, act){
    document.querySelectorAll('[data-act]').forEach(b=>b.classList.remove('on')); btn.classList.add('on');
    orbs.forEach(o=>{ o.classList.remove('idle','thinking','speaking'); o.classList.add(act); });
  }
  function setMood(btn, fill){
    document.querySelectorAll('[data-mood]').forEach(b=>b.classList.remove('on')); btn.classList.add('on');
    setFill(fill,true);
  }
  setFill(82,false);
</script>
</body>
</html>
