<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Orb Lab — Fitness Sherpa coach</title>
<style>
  :root{
    --bg:#0E0F11; --bg-deep:#08090A; --surface:#1A1B1E; --surface-2:#232427; --line:#2A2C30;
    --text:#F4F5F4; --muted:#8A8E95; --faint:#5A5E65;
    --mint:#C7F0E3; --mono:"SF Mono","JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{ background:radial-gradient(900px 500px at 50% 0%,#15171a,var(--bg-deep)); color:var(--text);
    font-family:var(--font); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:38px 20px 60px; }
  h1{ font-size:15px; font-weight:700; letter-spacing:-.3px; }
  .sub{ font-family:var(--mono); font-size:10px; letter-spacing:2px; color:var(--faint); margin-top:6px; }

  /* ---------- THE ORB ---------- */
  .stage{ margin:40px 0 30px; position:relative; width:260px; height:260px; display:grid; place-items:center; }
  .orb{ --c:var(--mint); --glowc:rgba(199,240,227,.5); position:relative; width:240px; height:240px; display:grid; place-items:center; }
  .orb.red{ --c:#F0917B; --glowc:rgba(240,145,123,.5); }
  .orb.amber{ --c:#F2D484; --glowc:rgba(242,212,132,.5); }

  .glow{ position:absolute; inset:18%; border-radius:50%;
    background:radial-gradient(circle, var(--glowc) 0%, transparent 68%);
    filter:blur(6px); animation:glowP 4s ease-in-out infinite; }

  .rings{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
  .ring{ fill:none; stroke:var(--c); transform-box:fill-box; transform-origin:center; }
  .r1{ stroke-width:1.5; opacity:.5; stroke-dasharray:3 9; animation:spin 22s linear infinite; }
  .r2{ stroke-width:1.5; opacity:.8; stroke-dasharray:60 400; stroke-linecap:round; animation:spinR 14s linear infinite; }
  .r3{ stroke-width:1; opacity:.35; animation:spin 30s linear infinite; }
  .sweep{ fill:none; stroke:var(--c); stroke-width:2; stroke-linecap:round; stroke-dasharray:90 380;
    transform-box:fill-box; transform-origin:center; opacity:0; transition:opacity .3s; animation:spin 3s linear infinite; }
  .orbit{ transform-box:fill-box; transform-origin:center; animation:spin 9s linear infinite; }
  .dot{ fill:var(--c); }

  .core{ position:relative; z-index:2; color:var(--c); display:grid; place-items:center;
    animation:breathe 4s ease-in-out infinite; filter:drop-shadow(0 0 10px var(--glowc)); }
  .core svg{ display:block; }

  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes spinR{ to{ transform:rotate(-360deg); } }
  @keyframes breathe{ 0%,100%{ transform:scale(1); opacity:.92 } 50%{ transform:scale(1.1); opacity:1 } }
  @keyframes glowP{ 0%,100%{ opacity:.4; transform:scale(1) } 50%{ opacity:.65; transform:scale(1.12) } }
  @keyframes speak{ 0%,100%{ transform:scale(1) } 22%{ transform:scale(1.16) } 48%{ transform:scale(.97) } 72%{ transform:scale(1.09) } }

  /* THINKING — faster spin, scanning sweep, quicker breath */
  .orb.thinking .r1{ animation-duration:7s; }
  .orb.thinking .r2{ animation-duration:4.5s; }
  .orb.thinking .orbit{ animation-duration:3s; }
  .orb.thinking .sweep{ opacity:.9; }
  .orb.thinking .core{ animation-duration:1s; }
  .orb.thinking .glow{ animation-duration:1.4s; }

  /* SPEAKING — core pulses in rhythm */
  .orb.speaking .core{ animation:speak .62s ease-in-out infinite; }
  .orb.speaking .glow{ animation-duration:.62s; }
  .orb.speaking .r2{ animation-duration:9s; }

  /* RED mood — tighter, edgier */
  .orb.red .core{ animation-duration:2.6s; }
  .orb.red .r1{ animation-duration:16s; }

  /* ---------- controls ---------- */
  .panel{ display:flex; flex-direction:column; gap:14px; align-items:center; }
  .group{ display:flex; align-items:center; gap:8px; }
  .glabel{ font-family:var(--mono); font-size:9px; letter-spacing:1.5px; color:var(--faint); width:64px; text-align:right; }
  .btn{ background:var(--surface); border:1px solid var(--line); color:var(--text); font-family:var(--font);
    font-size:12.5px; font-weight:600; padding:9px 15px; border-radius:999px; cursor:pointer; transition:.15s; }
  .btn:hover{ border-color:#3a5b52; }
  .btn.on{ background:rgba(199,240,227,.12); border-color:var(--mint); color:var(--mint); }
  .btn.on.red{ background:rgba(240,145,123,.12); border-color:#F0917B; color:#F0917B; }

  /* in-context preview */
  .ctx{ margin-top:34px; display:flex; gap:14px; align-items:center; }
  .ctx-card{ display:flex; align-items:center; gap:11px; background:var(--surface); border:1px solid var(--line);
    border-left:3px solid var(--mint); border-radius:0 16px 16px 0; padding:12px 15px; }
  .mini{ width:40px; height:40px; }
  .ctx-card .t{ font-size:13px; font-weight:700; } .ctx-card .s{ font-size:11px; color:var(--muted); margin-top:2px; }
  .note{ font-family:var(--mono); font-size:9px; letter-spacing:1px; color:var(--faint); margin-top:26px; text-align:center; line-height:1.7; }
</style>
</head>
<body>
  <h1>Orb Lab</h1>
  <div class="sub">FITNESS SHERPA · COACH CHARACTER · v1</div>

  <div class="stage">
    <div class="orb idle" id="orb">
      <div class="glow"></div>
      <svg class="rings" viewBox="0 0 240 240" aria-hidden="true">
        <circle class="ring r1" cx="120" cy="120" r="104"/>
        <circle class="ring r3" cx="120" cy="120" r="84"/>
        <circle class="ring r2" cx="120" cy="120" r="72"/>
        <circle class="sweep" cx="120" cy="120" r="58"/>
        <g class="orbit"><circle class="dot" cx="120" cy="16" r="4.5"/><circle class="dot" cx="120" cy="224" r="3" opacity=".6"/></g>
      </svg>
      <div class="core">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.6 6.8L21 11l-6.4 2.2L12 22l-2.6-8.8L3 11l6.4-2.2z" fill="currentColor"/></svg>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="group">
      <span class="glabel">STATE</span>
      <button class="btn on" data-act="idle"     onclick="setAct(this,'idle')">Idle</button>
      <button class="btn"    data-act="thinking" onclick="setAct(this,'thinking')">Thinking</button>
      <button class="btn"    data-act="speaking" onclick="setAct(this,'speaking')">Speaking</button>
    </div>
    <div class="group">
      <span class="glabel">RECOVERY</span>
      <button class="btn on" data-mood="green" onclick="setMood(this,'green')">Recovered</button>
      <button class="btn"    data-mood="amber" onclick="setMood(this,'amber')">Borderline</button>
      <button class="btn"    data-mood="red"   onclick="setMood(this,'red')">Under-recovered</button>
    </div>
  </div>

  <div class="ctx">
    <div class="ctx-card">
      <div class="orb mini idle" id="mini" style="width:40px;height:40px">
        <div class="glow"></div>
        <svg class="rings" viewBox="0 0 240 240"><circle class="ring r1" cx="120" cy="120" r="104"/><circle class="ring r2" cx="120" cy="120" r="72"/><g class="orbit"><circle class="dot" cx="120" cy="16" r="6"/></g></svg>
        <div class="core"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.6 6.8L21 11l-6.4 2.2L12 22l-2.6-8.8L3 11l6.4-2.2z" fill="currentColor"/></svg></div>
      </div>
      <div><div class="t">AI Coach</div><div class="s">primed with today's data</div></div>
    </div>
  </div>

  <div class="note">how it'd sit in the app (small) →<br>idle breathes · thinking scans · speaking pulses · colour follows your readiness</div>

<script>
  function setAct(btn, act){
    document.querySelectorAll('[data-act]').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    ['orb','mini'].forEach(id=>{ const o=document.getElementById(id); o.classList.remove('idle','thinking','speaking'); o.classList.add(act); });
  }
  function setMood(btn, mood){
    document.querySelectorAll('[data-mood]').forEach(b=>b.classList.remove('on','red'));
    btn.classList.add('on'); if(mood==='red') btn.classList.add('red');
    ['orb','mini'].forEach(id=>{ const o=document.getElementById(id); o.classList.remove('red','amber'); if(mood!=='green') o.classList.add(mood); });
  }
</script>
</body>
</html>
